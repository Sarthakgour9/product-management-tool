<div class="container">

<h2 class="title">Product Management</h2>

<div class="form-card">

<form>

<div class="form-group">
<input type="text" placeholder="Product Name"
[(ngModel)]="product.name" name="name">
</div>

<div class="form-group">
<input type="number" placeholder="Price"
[(ngModel)]="product.price" name="price">
</div>

<div class="form-group">
<select [(ngModel)]="product.category" name="category">
<option value="">Select Category</option>
<option *ngFor="let c of categories" [value]="c">
{{c}}
</option>
</select>
</div>

<div class="form-group">
<select [(ngModel)]="product.status" name="status">
<option value="">Select Status</option>
<option *ngFor="let s of statusList" [value]="s">
{{s}}
</option>
</select>
</div>

<button class="save-btn" (click)="saveProduct()">Save Product</button>

</form>

</div>

<div class="table-card">

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let p of products">

<td>{{p.id}}</td>
<td>{{p.name}}</td>
<td>₹ {{p.price}}</td>
<td>{{p.category}}</td>

<td>
<span class="status" [ngClass]="p.status">
{{p.status}}
</span>
</td>

<td>
<button class="delete-btn" (click)="deleteProduct(p.id)">
Delete
</button>
</td>

</tr>

</tbody>

</table>

</div>

</div>
