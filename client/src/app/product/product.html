<div class="container">

<h2 class="title">Product Management</h2>

<div *ngIf="error" class="error-message">
⚠️ {{error}}
</div>

<div class="form-card">
  <h3>➕ Add New Product</h3>
<form>

<div class="form-group">
<label>Product Name</label>
<input type="text" placeholder="Enter product name"
[(ngModel)]="product.name" name="name">
</div>

<div class="form-group">
<label>Price (₹)</label>
<input type="number" placeholder="Enter price"
[(ngModel)]="product.price" name="price">
</div>

<div class="form-group">
<label>Category</label>
<select [(ngModel)]="product.category" name="category">
<option value="">Select Category</option>
<option *ngFor="let c of categories" [value]="c">
{{c}}
</option>
</select>
</div>

<div class="form-group">
<label>Status</label>
<select [(ngModel)]="product.status" name="status">
<option value="">Select Status</option>
<option *ngFor="let s of statusList" [value]="s">
{{s}}
</option>
</select>
</div>

<button class="save-btn" (click)="saveProduct()">💾 Save Product</button>

</form>

</div>
<div class="table-card">

<!-- LOADING -->
<div *ngIf="loading" class="loading">
⏳ Loading products...
</div>

<!-- TABLE -->
<table *ngIf="!loading && products.length > 0">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody>

<tr *ngFor="let p of products">

<td>#{{p.id}}</td>
<td>{{p.name}}</td>
<td>₹ {{p.price}}</td>
<td>{{p.category}}</td>

<td>
<span class="status"
[ngClass]="p.status === 'Available' ? 'Available' : 'Out-of-Stock'">
{{p.status}}
</span>
</td>

<td>
<button class="delete-btn" (click)="deleteProduct(p.id)">
🗑️ Delete
</button>
</td>

</tr>

</tbody>

</table>

<!-- EMPTY STATE -->
<div *ngIf="!loading && products.length === 0" class="empty-state">
<div class="empty-state-icon">📦</div>
<p>No products found. Add your first product above!</p>
</div>

</div>

</div>
